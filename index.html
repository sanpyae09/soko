        // --- Components ---
        function MenuBtn({ icon: Icon, label, screen, count, activeScreen, onClick, color }) {
          const isActive = activeScreen === screen;
          return (
            <button onClick={() => onClick(screen)} className={`w-full flex items-center justify-between px-4 py-3 rounded-xl font-medium transition-colors ${isActive ? 'bg-indigo-600 text-white shadow-md' : (color || 'text-slate-600 hover:bg-slate-50')}`}>

        function StatCard({ icon: Icon, title, val, color, isCount, filter }) {
          const colors = { emerald: 'bg-emerald-100 text-emerald-600', rose: 'bg-rose-100 text-rose-600', amber: 'bg-amber-100 text-amber-600', blue: 'bg-blue-100 text-blue-600', purple: 'bg-purple-100 text-purple-600' };
          const textColors = { emerald: 'text-emerald-600', rose: 'text-rose-600', amber: 'text-amber-600', blue: 'text-blue-600', purple: 'text-purple-600' };
          return (
            <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-start gap-4">
              <div className={`p-3 rounded-xl ${colors[color]}`}><Icon size={24} /></div>
              <div className="flex-1">
                <h3 className="text-sm font-bold text-slate-500 mb-1">{title}</h3>
                <p className={`text-2xl font-black ${textColors[color]}`}>{val.toLocaleString()} {isCount ? <span className="text-base text-slate-500">ခု</span> : 'Ks'}</p>

        function Input({ label, type="text", val, setVal, req, icon: Icon, min, max, placeholder, disabled }) {
          return (
            <div className="space-y-1.5">
              <label className="flex items-center gap-1.5 text-xs font-semibold text-slate-600">{Icon && <Icon size={14} className="text-indigo-500"/>} {label}</label>
              <input type={type} value={val} onChange={(e) => setVal(e.target.value)} required={req} min={min} max={max} placeholder={placeholder} disabled={disabled} className="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white disabled:bg-slate-100 disabled:text-slate-500" />
            </div>

        }

        function PaymentMethodSelector({ selected, onChange, accounts }) {
          const defaultOptions = [{ id: 'Cash', label: 'ငွေသား', icon: Banknote }, { id: 'KBZ Pay', label: 'KBZ Pay', icon: Smartphone }, { id: 'Wave Money', label: 'Wave Money', icon: Smartphone }];
          const displayOptions = accounts && accounts.length > 0 ? [{ id: 'Cash', label: 'ငွေသား', icon: Banknote }, ...accounts.map(acc => ({ id: `${acc.provider} - ${acc.name}`, label: acc.provider, detail: acc.name, icon: Smartphone }))] : defaultOptions;
          return (
            <div className="space-y-2">
              <label className="flex items-center gap-1.5 text-xs font-semibold text-slate-600">ငွေပေးချေမှုပုံစံ ရွေးချယ်ပါ</label>
              <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                {displayOptions.map(opt => {
                  const IconComponent = opt.icon;
                  return (
                    <button key={opt.id} type="button" onClick={() => onChange(opt.id)} className={`flex flex-col items-center justify-center p-2.5 rounded-xl border transition-all ${selected === opt.id ? 'bg-indigo-50 border-indigo-500 text-indigo-700 shadow-sm' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                      <IconComponent size={18} className={`mb-1.5 ${selected === opt.id ? 'text-indigo-500' : 'text-slate-400'}`} />
                      <span className="text-xs font-bold">{opt.label}</span>
                      {opt.detail && <span className="text-[10px] text-slate-400 mt-0.5 truncate w-full px-1">{opt.detail}</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        }

        function RecordTable({ data, onDebtPayment, onCancelOrder, onDelete }) {
          const tableClickTimer = useRef(0);
          const handleRowClick = (r) => {
            const now = new Date().getTime();
            if (now - tableClickTimer.current < 400) { onCancelOrder(r); }
            tableClickTimer.current = now;
          };

          return (
            <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-x-auto">
              <table className="w-full text-left border-collapse text-sm min-w-[900px]">
                <thead>
                  <tr className="bg-slate-100 text-slate-600 border-b border-slate-200">
                    <th className="px-3 py-3 text-center w-12">စဉ်</th>
                    <th className="px-3 py-3 whitespace-nowrap">အမည်/Code</th>
                    <th className="px-3 py-3 text-right">ကျသင့်ငွေ</th>
                    <th className="px-3 py-3 text-right text-emerald-600">ရငွေ (ပေးချေမှု)</th>
                    <th className="px-3 py-3 text-right text-rose-500">အကြွေး (ကျန်ငွေ)</th>
                    <th className="px-3 py-3 text-right text-purple-600">အမြတ်</th>
                    <th className="px-3 py-3 whitespace-nowrap">မှတ်ချက်</th>
                    <th className="px-3 py-3 text-center w-12"><Settings size={14} className="mx-auto"/></th>
                  </tr>
                </thead>
                <tbody>
                  {data.length === 0 ? (
                    <tr><td colSpan="8" className="p-8 text-center text-slate-500">မှတ်တမ်းမရှိပါ။</td></tr>
                  ) : (
                    data.map((r, i) => (
                      <tr key={r.id} onClick={() => handleRowClick(r)} className="border-b border-slate-100 hover:bg-indigo-50/50 transition-colors cursor-pointer" title="ဖျက်သိမ်းရန် (Cancel) နှစ်ချက်နှိပ်ပါ">
                        <td className="px-3 py-3 text-center text-slate-500">{i + 1}</td>
                        <td className="px-3 py-3">
                          <p className="font-bold text-slate-800">{r.name}</p>
                          <p className="text-xs text-slate-500 flex items-center gap-1">{r.code} {r.needsDelivery && <Truck size={10} className="text-indigo-500"/>}</p>
                        </td>
                        <td className="px-3 py-3 text-right font-medium">{r.amount > 0 ? r.amount.toLocaleString() : '-'}</td>
                        <td className="px-3 py-3 text-right">
                          <span className="text-emerald-600 font-bold block">{r.received > 0 ? r.received.toLocaleString() : '-'}</span>
                          {r.received > 0 && <span className="text-[10px] text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded mt-1 inline-block border border-slate-200">{r.paymentMethod || 'Cash'}</span>}
                        </td>
                        <td className="px-3 py-3 text-right align-middle">
                          {r.balance > 0 ? (
                            <div className="flex flex-col items-end gap-1.5">
                              <span className="text-rose-600 font-black">{r.balance.toLocaleString()} Ks</span>
                              <button onClick={(e) => { e.stopPropagation(); onDebtPayment(r); }} className="text-[10px] bg-rose-100 hover:bg-rose-200 text-rose-700 font-bold px-2 py-1 rounded-md transition-colors border border-rose-200 shadow-sm">အကြွေးဆပ်မည်</button>
                            </div>
                          ) : (
                            <div className="flex flex-col items-end">
                              <span className="text-emerald-600 font-bold text-xs flex items-center gap-1"><CheckCircle2 size={12}/> အပြည့်ပေးချေပြီး</span>
                              {r.paidDate && <span className="text-[10px] text-slate-400 mt-0.5">{r.paidDate}</span>}
                            </div>
                          )}
                        </td>
                        <td className="px-3 py-3 text-right text-purple-600 font-bold">{(r.profit || 0) > 0 ? r.profit.toLocaleString() : '-'}</td>
                        <td className="px-3 py-3 text-xs text-slate-500 max-w-[120px] truncate">{r.remark || '-'}</td>
                        <td className="px-3 py-3 text-center">
                          <button onClick={(e) => { e.stopPropagation(); onDelete(r.id); }} className="text-slate-400 hover:text-red-500 bg-white p-1.5 rounded shadow-sm border border-slate-200"><Trash2 size={14}/></button>
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
              <div className="p-3 text-xs text-indigo-500 bg-indigo-50 text-center font-semibold border-t border-slate-200">
                💡 အော်ဒါကို Cancel (ဖျက်သိမ်း) လိုပါက စာရင်းပေါ်တွင် နှစ်ချက်မြန်မြန်နှိပ်ပါ (Double Tap)
              </div>
            </div>
          );
        }

        // --- Main App Component ---
        function App() {
          const [session, setSession] = useState(null);
          const [isAuthLoading, setIsAuthLoading] = useState(true);

          const [activeScreen, setActiveScreen] = useState('home'); 
          const [isMenuOpen, setIsMenuOpen] = useState(false); 
          const [homeFilter, setHomeFilter] = useState('monthly'); 
          const [isFilterOpen, setIsFilterOpen] = useState(false); 

          const prodClickTimer = useRef(0); 

          const getTodayDate = () => new Date().toISOString().split('T')[0];

          // Data States
          const [records, setRecords] = useState([]);
          const [products, setProducts] = useState([]);
          const [paymentAccounts, setPaymentAccounts] = useState([]); 
          
          const [searchTerm, setSearchTerm] = useState('');
          const [dailyDate, setDailyDate] = useState(getTodayDate()); 
          const [showSuccess, setShowSuccess] = useState(false);
          const [successMsg, setSuccessMsg] = useState('');

          // Modals States
          const [editingProduct, setEditingProduct] = useState(null);
          const [debtPaymentRecord, setDebtPaymentRecord] = useState(null);
          const [debtPaymentDate, setDebtPaymentDate] = useState(getTodayDate());
          const [debtPaymentMethod, setDebtPaymentMethod] = useState('Cash');
          const [cancelOrderModal, setCancelOrderModal] = useState(null);
          const [voucherData, setVoucherData] = useState(null); 

          // Add Product States
          const [productImage, setProductImage] = useState('');
          const [productName, setProductName] = useState('');
          const [productCode, setProductCode] = useState('');
          const [productPrice, setProductPrice] = useState('');
          const [productCost, setProductCost] = useState(''); 
          const [productStock, setProductStock] = useState('');

          // Sell Modal States
          const [sellModal, setSellModal] = useState(null);
          const [sellQty, setSellQty] = useState(1);
          const [sellCustName, setSellCustName] = useState('');
          const [sellIsDelivery, setSellIsDelivery] = useState(false);
          const [sellPhone, setSellPhone] = useState('');
          const [sellAddress, setSellAddress] = useState('');
          const [sellCity, setSellCity] = useState('');
          const [sellReceived, setSellReceived] = useState('');
          const [sellRemark, setSellRemark] = useState('');
          const [sellPaymentMethod, setSellPaymentMethod] = useState('Cash');

          // Settings Form State
          const [newAccProvider, setNewAccProvider] = useState('KBZ Pay');
          const [newAccName, setNewAccName] = useState('');
          const [newAccNumber, setNewAccNumber] = useState('');

          // --- Authentication Setup ---
          useEffect(() => {
            supabaseClient.auth.getSession().then(({ data: { session } }) => {
              setSession(session);
              setIsAuthLoading(false);
            });

            const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
              setSession(session);
              if (!session) {
                setProducts([]); setRecords([]); setPaymentAccounts([]);
              }
            });

            return () => subscription.unsubscribe();
          }, []);

          // --- Google Login ---
          const handleGoogleLogin = async () => {
            const { error } = await supabaseClient.auth.signInWithOAuth({
              provider: 'google',
              options: { redirectTo: window.location.origin }
            });
            if (error) alert("Google ဖြင့် ချိတ်ဆက်ရာတွင် အခက်အခဲရှိပါသည်။: " + error.message);
          };

          const handleLogout = async () => {
            await supabaseClient.auth.signOut();
          };

          // --- Load Data (Local First, then Supabase) ---
          const fetchSupabaseData = async () => {
            if (!session?.user?.id) return;
            const userId = session.user.id;

            try {
              const { data: setObj } = await supabaseClient.from('user_settings').select('*').eq('user_id', userId).single();
              if (setObj && setObj.payment_accounts) setPaymentAccounts(setObj.payment_accounts);

              const { data: prodData } = await supabaseClient.from('products').select('*').eq('user_id', userId);
              if (prodData) {
                const formattedProds = prodData.map(d => ({ id: Number(d.id), ...d.data })).sort((a,b) => b.id - a.id);
                setProducts(formattedProds);
              }

              const { data: recData } = await supabaseClient.from('records').select('*').eq('user_id', userId);
              if (recData) {
                const formattedRecs = recData.map(d => ({ id: Number(d.id), ...d.data })).sort((a,b) => b.id - a.id);
                setRecords(formattedRecs);
              }
            } catch(e) { console.error("Error fetching data: ", e); }
          };

          useEffect(() => {
            if (session?.user?.id) {
              const localProds = localStorage.getItem(`soko_products_${session.user.id}`);
              const localRecs = localStorage.getItem(`soko_records_${session.user.id}`);
              if(localProds) setProducts(JSON.parse(localProds));
              if(localRecs) setRecords(JSON.parse(localRecs));

              fetchSupabaseData();
              const channel = supabaseClient.channel('schema-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public' }, fetchSupabaseData).subscribe();
              return () => supabaseClient.removeChannel(channel);
            }
          }, [session]);

          // Always save to LocalStorage when State changes
          useEffect(() => {
            if (session?.user?.id) {
              localStorage.setItem(`soko_products_${session.user.id}`, JSON.stringify(products));
            }
          }, [products, session]);

          useEffect(() => {
            if (session?.user?.id) {
              localStorage.setItem(`soko_records_${session.user.id}`, JSON.stringify(records));
            }
          }, [records, session]);

          const showSuccessMessage = (msg) => {
            setSuccessMsg(msg);
            setShowSuccess(true);
            setTimeout(() => setShowSuccess(false), 2000);
          }

          // --- Background Sync Helpers (No await block UI) ---
          const saveProductToCloud = (id, data) => {
            if(!session) return;
            const dataToSave = { ...data, user_id: session.user.id };
            supabaseClient.from('products').upsert({ id: id.toString(), user_id: session.user.id, data: dataToSave })
              .then(({error}) => { if(error) console.error(error) });
          };
          const deleteProdFromCloud = (id) => {
            if(!session) return;
            supabaseClient.from('products').delete().eq('id', id.toString()).then(({error}) => { if(error) console.error(error) });
          };
          const saveRecordToCloud = (id, data) => {
            if(!session) return;
            const dataToSave = { ...data, user_id: session.user.id };
            supabaseClient.from('records').upsert({ id: id.toString(), user_id: session.user.id, data: dataToSave })
              .then(({error}) => { if(error) console.error(error) });
          };
          const deleteRecFromCloud = (id) => {
            if(!session) return;
            supabaseClient.from('records').delete().eq('id', id.toString()).then(({error}) => { if(error) console.error(error) });
          };
          const saveSettingsToCloud = (accounts) => {
            if(!session) return;
            supabaseClient.from('user_settings').upsert({ user_id: session.user.id, payment_accounts: accounts, updated_at: new Date().toISOString() })
              .then(({error}) => { if(!error) showSuccessMessage('ဆက်တင် သိမ်းဆည်းပြီးပါပြီ'); });
          };

          // --- Actions ---
          const handleAddProduct = (e) => {
            e.preventDefault();
            if (!productName || !productCode || !productPrice) return;
            const id = Date.now();
            const newProduct = { 
              id, image: productImage, name: productName, code: productCode, 
              price: Number(productPrice), cost: Number(productCost) || 0, stock: Number(productStock) || 0 
            };
            
            setProducts([newProduct, ...products]); // Optimistic local update
            setProductImage(''); setProductName(''); setProductCode(''); setProductPrice(''); setProductCost(''); setProductStock('');
            showSuccessMessage('ပစ္စည်းစာရင်း သွင်းပြီးပါပြီ');
            setActiveScreen('viewProducts');
            
            saveProductToCloud(id, newProduct); // Background sync
          };

          const handleEditProductSubmit = (e) => {
            e.preventDefault();
            if (!editingProduct.name || !editingProduct.code || !editingProduct.price) return;
            setProducts(products.map(p => p.id === editingProduct.id ? editingProduct : p));
            const prodToSave = editingProduct;
            setEditingProduct(null);
            showSuccessMessage('ပစ္စည်းအချက်အလက် ပြင်ဆင်ပြီးပါပြီ');
            
            saveProductToCloud(prodToSave.id, prodToSave);
          };

          const handleImageUpload = (e, isEditing = false) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => { 
                const img = new window.Image();
                img.onload = () => {
                  const canvas = document.createElement('canvas');
                  const MAX_WIDTH = 400; // Resize to save DB space
                  const scaleSize = MAX_WIDTH / img.width;
                  canvas.width = MAX_WIDTH;
                  canvas.height = img.height * scaleSize;
                  const ctx = canvas.getContext('2d');
                  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                  const resizedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                  
                  if (isEditing) setEditingProduct({...editingProduct, image: resizedBase64});
                  else setProductImage(resizedBase64); 
                };
                img.src = reader.result;
              };
              reader.readAsDataURL(file);
            }
          };

          const handleProductClick = (product) => {
            const now = new Date().getTime();
            if (now - prodClickTimer.current < 400) {
              setSellModal(product); setSellQty(1); setSellCustName(''); setSellIsDelivery(false);
              setSellPhone(''); setSellAddress(''); setSellCity(''); setSellReceived(''); setSellRemark('');
              setSellPaymentMethod('Cash');
            }
            prodClickTimer.current = now;
          };

          const handleConfirmSale = (e) => {
            e.preventDefault();
            if (sellQty > sellModal.stock) { alert("လက်ကျန်မလောက်ပါ! ကျေးဇူးပြု၍ အရေအတွက် ပြန်စစ်ပါ။"); return; }

            const updatedProduct = { ...sellModal, stock: sellModal.stock - sellQty };
            setProducts(products.map(p => p.id === sellModal.id ? updatedProduct : p));

            const totalAmount = sellModal.price * sellQty;
            const rcv = Number(sellReceived) || 0;
            const bal = totalAmount > rcv ? totalAmount - rcv : 0;
            
            const costPrice = sellModal.cost || 0;
            const profitAmount = totalAmount - (costPrice * sellQty);
            const id = Date.now();

            const newOrder = {
              id, date: getTodayDate(), name: sellCustName || 'ဝယ်သူအမည်မသိ', code: sellModal.code,
              productName: sellModal.name, city: sellIsDelivery ? sellCity : '-', quantity: sellQty,

              paymentMethod: rcv > 0 ? sellPaymentMethod : '-', paidDate: bal === 0 ? getTodayDate() : null
            };

            setSellModal(null);
            setVoucherData(newOrder); 
            showSuccessMessage('ရောင်းချခြင်း အောင်မြင်ပါသည်');
            
            saveProductToCloud(sellModal.id, updatedProduct);
            saveRecordToCloud(id, newOrder);

              setProducts(products.map(p => p.id === restoredProduct.id ? restoredProduct : p));
              saveProductToCloud(restoredProduct.id, restoredProduct);

            setRecords(records.filter(r => r.id !== record.id));

            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1);
            const startOfWeek = new Date(now.setDate(diff));
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            return { currYear, currMonth, startOfWeekStr: startOfWeek.toISOString().split('T')[0], endOfWeekStr: endOfWeek.toISOString().split('T')[0] };
          };

                  <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-in fade-in duration-200">
                    <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl">
                      <div className="border-b border-slate-100 px-6 py-4 flex justify-between items-center rounded-t-2xl"><h3 className="font-bold text-lg text-rose-600 flex items-center gap-2"><AlertCircle size={18}/> အော်ဒါ ဖျက်သိမ်းမည်</h3><button onClick={() => setCancelOrderModal(null)} className="bg-slate-100 p-1.5 rounded-full text-slate-500"><X size={18}/></button></div>
                      <div className="p-6">
                        <p className="text-slate-600 text-sm mb-4 leading-relaxed">
                          <span className="font-bold text-slate-800">{cancelOrderModal.name}</span> ၏ <span className="font-bold">{cancelOrderModal.productName} ({cancelOrderModal.quantity} ခု)</span> အော်ဒါကို ဖျက်သိမ်းရန် သေချာပါသလား?
                        </p>
                        <div className="bg-amber-50 text-amber-700 p-3 rounded-lg text-xs border border-amber-200 font-medium leading-relaxed">
                          ဤလုပ်ဆောင်ချက်သည် အရောင်းမှတ်တမ်းမှ ဖယ်ရှားပြီး ပစ္စည်းအရေအတွက်ကို လက်ကျန်ထဲသို့ အလိုအလျောက် ပြန်လည်ပေါင်းထည့်ပေးမည် ဖြစ်ပါသည်။ ငွေစာရင်းမှလည်း လျှော့ချပေးမည် ဖြစ်ပါသည်။
                        </div>
                      </div>
                      <div className="border-t border-slate-100 p-4 flex gap-3 rounded-b-2xl"><button type="button" onClick={() => setCancelOrderModal(null)} className="flex-1 py-2.5 bg-slate-100 text-slate-700 font-bold rounded-xl">မဖျက်တော့ပါ</button><button type="button" onClick={confirmCancelOrder} className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl flex justify-center items-center gap-2 shadow-lg shadow-red-200"><Trash2 size={16}/> ဖျက်သိမ်းမည်</button></div>
                    </div>
                  </div>
                )}

              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
